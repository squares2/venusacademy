<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#C9A84C" />
  <meta name="description" content="Venus Gym — Professional Gym Management System" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Venus Gym" />

  <title>Venus Gym</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon-192.webp" type="image/webp" />
  <link rel="apple-touch-icon" href="assets/icon-192.webp" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/auth.css" />
  <link rel="stylesheet" href="styles/modals.css" />
  <link rel="stylesheet" href="styles/modules.css" />
</head>

<body>

  <!-- ═══════════════════════════════════════════
       AUTH SCREEN — Login
  ═══════════════════════════════════════════ -->
  <div id="auth-screen">
    <div class="auth-screen">

      <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
          <img src="assets/icon-192.webp" class="auth-logo-icon" alt="Venus" style="width:72px;height:72px;border-radius:50%;object-fit:cover;display:block;margin:0 auto;">
          <div class="auth-logo-name">VENUS</div>
          <div class="auth-logo-sub">GYM MANAGEMENT</div>
        </div>

        <!-- Error message -->
        <div class="auth-error" id="auth-error"></div>

        <!-- Login Form -->
        <form id="login-form" autocomplete="on">

          <div class="form-group">
            <label class="form-label" for="login-email" id="label-email">Email Address</label>
            <div class="input-icon-wrap">
              <span class="input-icon">✉</span>
              <input
                class="form-input"
                id="login-email"
                name="email"
                type="email"
                autocomplete="username"
                placeholder="you@example.com"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password" id="label-password">Password</label>
            <div class="input-icon-wrap">
              <span class="input-icon">🔒</span>
              <input
                class="form-input"
                id="login-password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              />
              <span class="input-toggle" id="pw-toggle" title="Show/hide password">👁</span>
            </div>
          </div>

          <button class="auth-submit" type="submit" id="login-btn">
            Sign In to Venus
          </button>

        </form>

        <!-- Language toggle inside login card -->
        <div class="auth-footer">
          <button
            id="lang-toggle-btn"
            class="lang-toggle"
            style="margin: 0 auto; display:inline-flex;"
            type="button"
          >
            🌐 ع
          </button>
          <br />
          <span style="margin-top:8px;display:block">
            Venus Gym © <span id="footer-year"></span>
          </span>
        </div>

      </div><!-- /auth-card -->

    </div><!-- /auth-screen -->
  </div><!-- /#auth-screen -->


  <!-- ═══════════════════════════════════════════
       APP SHELL — Sidebar + Topbar + Content
  ═══════════════════════════════════════════ -->
  <div id="app-shell" class="hidden">
    <div id="app">

      <!-- ── Sidebar ── -->
      <aside class="sidebar" id="sidebar">

        <!-- Logo -->
        <div class="sidebar-logo">
          <img src="assets/icon-192.webp" class="logo-icon" alt="Venus" style="border-radius:50%;width:38px;height:38px;object-fit:cover;">
          <span class="logo-text">VENUS</span>
        </div>

        <!-- Collapse toggle (desktop) -->
        <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">‹</button>

        <!-- Navigation -->
        <nav class="sidebar-nav" id="sidebar-nav">
          <!-- Rendered by app.js → renderSidebar() -->
        </nav>

        <!-- User footer -->
        <div class="sidebar-footer">
          <div class="sidebar-user" onclick="App.logout()">
            <div class="user-avatar" id="sidebar-user-avatar">?</div>
            <div class="user-info">
              <div class="user-name" id="sidebar-user-name">—</div>
              <div class="user-role" id="sidebar-user-role">—</div>
            </div>
          </div>
        </div>

      </aside><!-- /sidebar -->

      <!-- Mobile overlay -->
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <!-- ── Main Content ── -->
      <div class="main-content">

        <!-- Topbar -->
        <header class="topbar">

          <!-- Mobile hamburger -->
          <button class="topbar-btn" id="mobile-menu-btn" title="Open menu">☰</button>

          <!-- Page title -->
          <h2 class="topbar-page-title" id="topbar-page-title">Dashboard</h2>

          <!-- Topbar actions -->
          <div class="topbar-actions">

            <!-- Language toggle -->
            <button
              class="lang-toggle"
              id="lang-toggle-btn"
              type="button"
              title="Switch language"
            >
              🌐 ع
            </button>

            <!-- Notifications (placeholder) -->
            <button class="topbar-btn" title="Notifications" id="notif-btn">
              🔔
              <span class="badge" id="notif-badge" style="display:none">0</span>
            </button>

            <!-- Logout -->
            <button
              class="topbar-btn"
              title="Sign out"
              onclick="App.logout()"
              style="font-size:15px;font-weight:700;letter-spacing:0px"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>

          </div>
        </header><!-- /topbar -->

        <!-- Page Content — rendered by router -->
        <main class="page-content" id="page-content">
          <div class="page-loader">
            <div class="spinner"></div>
            <span>Loading…</span>
          </div>
        </main>

      </div><!-- /main-content -->

    </div><!-- /#app -->
  </div><!-- /#app-shell -->


  <!-- ── Toast Container ── -->
  <div id="toast-container"></div>


  <!-- ═══════════════════════════════════════════
       FIREBASE SDK (compat v9)
  ═══════════════════════════════════════════ -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- Chart.js (used by Reports) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- ═══════════════════════════════════════════
       APP SCRIPTS — load order matters
  ═══════════════════════════════════════════ -->
  <script src="scripts/firebase-config.js"></script>
  <script src="scripts/utils.js"></script>
  <script src="scripts/subscribers.js"></script>
  <script src="scripts/modules-a.js"></script>
  <script src="scripts/modules-b.js"></script>
  <script src="scripts/backup.js"></script>
  <script src="scripts/app.js"></script>

  <!-- ── Minor inline inits ── -->
  <script>
    // Footer year
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    // PWA service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>

</body>
</html>
